services:
  postgres:
    image: postgres:16-alpine
    container_name: ilo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ilo
      POSTGRES_PASSWORD: ilo_dev_password
      POSTGRES_DB: ilo
    ports:
      - "5432:5432"
    volumes:
      - ilo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilo -d ilo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ilo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ilo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ilo_pg_data:
  ilo_redis_data:
